name: CI

on:
  push:
    branches: [main]

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: make fmt-check

  check:
    strategy:
      matrix:
        os: [macos-26, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - shell: bash
        run: make vet test

  build-windows:
    needs: [fmt, check]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build printproxy for windows/${{ matrix.arch }}
        env:
          GOOS: windows
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: "0"
        run: go build -trimpath -ldflags="-s -w" -o printproxy-windows-${{ matrix.arch }}.exe .
      - uses: actions/upload-artifact@v4
        with:
          name: printproxy-windows-${{ matrix.arch }}
          path: printproxy-windows-${{ matrix.arch }}.exe

  build-darwin:
    needs: [fmt, check]
    runs-on: macos-26
    strategy:
      matrix:
        include:
          - { arch: amd64, carch: x86_64 }
          - { arch: arm64, carch: arm64 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build printproxy for darwin/${{ matrix.arch }}
        env:
          GOOS: darwin
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: "1"
          CGO_CFLAGS: -arch ${{ matrix.carch }}
          CGO_LDFLAGS: -arch ${{ matrix.carch }}
        run: go build -trimpath -ldflags="-s -w" -o printproxy-darwin-${{ matrix.arch }} .
      - uses: actions/upload-artifact@v4
        with:
          name: printproxy-darwin-${{ matrix.arch }}
          path: printproxy-darwin-${{ matrix.arch }}

  release:
    needs: [build-windows, build-darwin]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          pattern: printproxy-*
          merge-multiple: true
      - name: Determine next version tag
        id: tag
        run: |
          latest=$(git tag -l 'v[0-9]*' | awk '/^v[0-9]+$/' | sort -V | tail -n 1)
          if [ -z "$latest" ]; then
            next=v1
          else
            next=v$((${latest#v} + 1))
          fi
          echo "tag=$next" >>"$GITHUB_OUTPUT"
      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.tag.outputs.tag }}" \
            --target "$GITHUB_SHA" \
            --title "${{ steps.tag.outputs.tag }}" \
            --generate-notes \
            printproxy-windows-amd64.exe \
            printproxy-windows-arm64.exe \
            printproxy-darwin-amd64 \
            printproxy-darwin-arm64
